<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <link rel="stylesheet" href="./resources/css/kvot.css">
  <link rel="icon" type="image/x-icon" href="./resources/images/favicon.ico">
  <title>karaoke – kvot ab</title>
  <style>
    .karaoke-wrap {
      position: absolute;
      top: 43px;
      left: 0;
      width: 100%;
      height: calc(100vh - 74px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      overflow: hidden;
    }

    /* ── video container ── */
    #yt-player-wrap {
      position: relative;
      width: 100%;
      max-width: 780px;
      flex-shrink: 0;
    }
    #yt-player-wrap iframe {
      display: block;
      width: 100%;
      aspect-ratio: 16/9;
      border: none;
    }

    /* ── lyric stage ── */
    #lyric-stage {
      flex: 1 1 auto;
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 16px 4px;
      box-sizing: border-box;
      overflow: hidden;
      gap: 6px;
    }

    .lyric-line {
      font-family: RawengulkSans, verdana, sans-serif;
      text-align: center;
      transition: all 0.35s ease;
      line-height: 1.25;
      max-width: 100%;
      white-space: pre-wrap;
    }

    /* previous line */
    .lyric-prev {
      font-size: clamp(0.75rem, 1.6vw, 1.1rem);
      color: var(--text-muted);
      opacity: 0.55;
    }

    /* active / current line */
    .lyric-current {
      font-size: clamp(1.1rem, 3vw, 2rem);
      color: var(--color-kvot-bright);
      text-shadow: 0 0 18px var(--color-kvot-accent), 0 2px 6px rgba(0,0,0,0.6);
      font-weight: bold;
    }

    .karaoke-fill {
      display: inline;
      background-image: linear-gradient(
        90deg,
        var(--color-kvot-accent) 0%,
        var(--color-kvot-accent) var(--fill, 0%),
        var(--color-kvot-bright) var(--fill, 0%),
        var(--color-kvot-bright) 100%
      );
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
    }

    /* next line */
    .lyric-next {
      font-size: clamp(0.75rem, 1.6vw, 1.1rem);
      color: var(--text-secondary);
      opacity: 0.7;
    }

    /* ── progress bar ── */
    #lyric-progress {
      width: 100%;
      max-width: 780px;
      height: 3px;
      background: var(--border-color);
      flex-shrink: 0;
      margin-bottom: 2px;
    }
    #lyric-progress-bar {
      height: 100%;
      background: var(--color-kvot-accent);
      width: 0%;
      transition: width 0.5s linear;
    }

    /* ── time indicator ── */
    #lyric-time {
      font-family: RawengulkSans, verdana, sans-serif;
      font-size: 0.75rem;
      color: var(--text-muted);
      flex-shrink: 0;
      margin-bottom: 2px;
    }
  </style>
</head>
<body>
  <header></header>

  <div class="karaoke-wrap">
    <div id="yt-player-wrap">
      <div id="yt-player"></div>
    </div>

    <div id="lyric-progress"><div id="lyric-progress-bar"></div></div>
    <div id="lyric-time"></div>

    <div id="lyric-stage">
      <div class="lyric-line lyric-prev"  id="line-prev"></div>
      <div class="lyric-line lyric-current" id="line-curr"></div>
      <div class="lyric-line lyric-next"  id="line-next"></div>
    </div>
  </div>

  <footer></footer>

  <script src="./resources/js/site.js"></script>
  <script>
    KVOT.renderHeader('karaoke');
    KVOT.renderNav('karaoke.html');
    KVOT.renderFooter();

    /* ── Lyrics with start times (seconds) ──────────────────────────────── */
    /* Adjust timestamps to match the actual video if needed.               */
    const time_shift = 0;
    const LYRICS = [
      { t:  0,   text: '' },
      { t:  19+time_shift,   text: 'Är du precis som jag' },
      { t:  20+time_shift,   text: 'Går till skolan varje dag' },
      { t:  22+time_shift,   text: 'Men jag får ingen lön' },
      { t:  24+time_shift,   text: '6 timmar jobb och stön' },
      { t:  26+time_shift,   text: 'Är du precis som jag' },
      { t: 28+time_shift,   text: 'Svår att väcka varje dag' },
      { t: 30+time_shift,   text: 'Lägger läxorna på hög' },
      { t: 32+time_shift,   text: 'Min hjärna är så trög' },
      { t: 34+time_shift,   text: 'Är du precis som jag' },
      { t: 36+time_shift,   text: 'Går ut femman just idag' },
      { t: 38+time_shift,   text: 'Nu är det slut med test' },
      { t: 39+time_shift,   text: 'Välkommen till vår stora fest' },
      { t: 42+time_shift,   text: 'Sen så lyckas jag' },
      { t: 44+time_shift,   text: 'Domarringen är så bra' },
      { t: 45+time_shift,   text: 'Detta måste firas nu' },
      { t: 48+time_shift,   text: 'Därför börjar jag dansa min dans' },
      { t: 53+time_shift,   text: 'Här får alla en chans.' },
      { t: 56+time_shift,  text: 'Som från ingenstans' },
      { t: 60+time_shift,  text: 'Kom och sola i vår glans' },
      { t: 63+time_shift,  text: 'För jag kan inte sitta still' },
      { t: 64+time_shift,  text: 'Nu får jag göra som jag vill' },
      { t: 67+time_shift,  text: 'För nu ska vi gå, gå, gå' },
      { t: 68+time_shift,  text: 'På sommar, lov, lov, lov' },
      { t: 71+time_shift,  text: 'Jag kan inte sitta still' },
      { t: 73+time_shift,  text: 'Nu får jag göra som jag vill' },
      { t: 75+time_shift,  text: 'Nästa steg det väntar där, är, är' },
      { t: 76+time_shift,  text: 'Men vi minns hur bra de var här' },
      { t: 81+time_shift,  text: '' },
    ];
    const VIDEO_ID = 'mwBqXgljq7g';
    // const VIDEO_ID = '6LaiReEDH28';

    /* ── YouTube IFrame API ─────────────────────────────────────────────── */
    const POLL_INTERVAL_MS = 250;
    let player, pollTimer;
    let currentIdx = -1;

    function escapeHtml(str) {
      return String(str || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function onYouTubeIframeAPIReady() {
      player = new YT.Player('yt-player', {
        videoId: VIDEO_ID,
        playerVars: {
          rel: 0,
          modestbranding: 1,
          cc_load_policy: 1,
          hl: 'sv',
        },
        events: {
          onReady: () => {
            pollTimer = setInterval(tick, POLL_INTERVAL_MS);
          },
        },
      });
    }

    function fmt(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + String(sec).padStart(2, '0');
    }

    function findIdx(t) {
      let idx = 0;
      for (let i = 0; i < LYRICS.length; i++) {
        if (LYRICS[i].t <= t) idx = i;
        else break;
      }
      return idx;
    }

    function getLineProgress(t, idx) {
      const start = LYRICS[idx]?.t ?? 0;
      const nextStart = (idx < LYRICS.length - 1) ? LYRICS[idx + 1].t : start + 2;
      const span = Math.max(0.05, nextStart - start);
      const p = (t - start) / span;
      return Math.max(0, Math.min(1, p));
    }

    function renderCurrentLine(text, progress) {
      const safe = escapeHtml(text);
      const pct = Math.round(progress * 1000) / 10;
      if (!safe) return '';
      return `<span class="karaoke-fill" style="--fill:${pct}%">${safe}</span>`;
    }

    function tick() {
      if (!player || typeof player.getCurrentTime !== 'function') return;
      const state = player.getPlayerState();
      if (state === YT.PlayerState.UNSTARTED || state === YT.PlayerState.ENDED) return;

      const t = player.getCurrentTime();
      const dur = player.getDuration();
      if (!dur) return;

      // progress bar
      document.getElementById('lyric-progress-bar').style.width = (t / dur * 100) + '%';
      document.getElementById('lyric-time').textContent = fmt(t) + ' / ' + fmt(dur);

      const idx = findIdx(t);
      const lineProgress = getLineProgress(t, idx);

      if (idx !== currentIdx) {
        currentIdx = idx;
        const prev = idx > 0 ? LYRICS[idx - 1].text : '';
        const next = idx < LYRICS.length - 1 ? LYRICS[idx + 1].text : '';
        document.getElementById('line-prev').textContent = prev;
        document.getElementById('line-next').textContent = next;
      }

      const curr = LYRICS[idx].text;
      document.getElementById('line-curr').innerHTML = renderCurrentLine(curr, lineProgress);
    }

    // Load YouTube IFrame API
    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);
  </script>
</body>
</html>
